services:
  api-boilerplate-production:
    env_file:
      - .env.production
    container_name: api-boilerplate-production
    restart: always
    build: .
    ports:
      - '3000:3000'
    depends_on:
      - postgres-production
      - redis-production
    networks:
      - api-production
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health/liveness']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres-production:
    image: postgres:15
    container_name: api-boilerplate-postgres-production
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-api_boilerplate_production}
      TZ: 'GMT'
      PGTZ: 'GMT'
    ports:
      - '5432:5432'
    volumes:
      - postgres-production:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    networks:
      - api-production

  pgadmin-production:
    container_name: api-boilerplate-pgadmin-production
    image: dpage/pgadmin4
    restart: always
    ports:
      - '5050:80'
    volumes:
      - pgadmin-production:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    networks:
      - api-production
    depends_on:
      - postgres-production

  minio-production:
    container_name: api-boilerplate-minio-production
    image: minio/minio:latest
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-production:/data
    command: server /data --console-address ":9001"
    networks:
      - api-production

  minio-create-bucket-production:
    container_name: api-boilerplate-minio-create-bucket-production
    image: minio/mc:latest
    depends_on:
      - minio-production
    networks:
      - api-production
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio-production:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/${AWS_S3_BUCKET_NAME:-api-boilerplate} --ignore-existing;
      mc anonymous set public myminio/${AWS_S3_BUCKET_NAME:-api-boilerplate};
      exit 0;
      "

  redis-production:
    container_name: api-boilerplate-redis-production
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-production:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c 'redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction $${REDIS_PASSWORD:+--requirepass "$$REDIS_PASSWORD"}'
    networks:
      - api-production

  alertmanager-production:
    container_name: api-boilerplate-alertmanager-production
    image: prom/alertmanager:latest
    restart: always
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SMTP_SMARTHOST: ${SMTP_SMARTHOST:-smtp.sendgrid.net:587}
      SMTP_USERNAME: ${SMTP_USERNAME:-apikey}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-${SENDGRID_API_KEY}}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-${MAIL_DEFAULT_EMAIL}}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-${MAIL_DEFAULT_EMAIL}}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.tmpl:ro
      - ./monitoring/alertmanager/docker-entrypoint.sh:/etc/alertmanager/docker-entrypoint.sh:ro
    entrypoint: ['/bin/sh', '/etc/alertmanager/docker-entrypoint.sh']
    networks:
      - api-production

  postgres-exporter-production:
    container_name: api-boilerplate-postgres-exporter-production
    image: prometheuscommunity/postgres-exporter:latest
    restart: always
    environment:
      DATA_SOURCE_NAME: 'postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres-production:5432/${DB_DATABASE:-api_boilerplate_production}?sslmode=disable'
    networks:
      - api-production

  redis-exporter-production:
    container_name: api-boilerplate-redis-exporter-production
    image: oliver006/redis_exporter:latest
    restart: always
    environment:
      REDIS_ADDR: 'redis://redis-production:6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - api-production

  prometheus-production:
    container_name: api-boilerplate-prometheus-production
    image: prom/prometheus:latest
    restart: always
    # No external ports — only reachable by Grafana via internal network
    volumes:
      - ./monitoring/prometheus-production.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/rules/alerts:ro
      - ./monitoring/recording.rules.yml:/etc/prometheus/rules/recording.rules.yml:ro
      - prometheus-production:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      - alertmanager-production
    networks:
      api-production:
        aliases:
          - prometheus

  loki-production:
    container_name: api-boilerplate-loki-production
    image: grafana/loki:3.4.2
    restart: always
    user: '10001:10001'
    # No external ports — only reachable by Grafana via internal network
    volumes:
      - ./monitoring/loki-config-production.yml:/etc/loki/config.yml:ro
      - loki-production:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      api-production:
        aliases:
          - loki

  grafana-production:
    container_name: api-boilerplate-grafana-production
    image: grafana/grafana:latest
    restart: always
    ports:
      - '3200:3000'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-production:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3200}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY:-changeme}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/api-overview.json
    depends_on:
      - prometheus-production
      - loki-production
    networks:
      - api-production

networks:
  api-production:
    driver: bridge

volumes:
  postgres-production:
    driver: local
  pgadmin-production:
    driver: local
  minio-production:
    driver: local
  redis-production:
    driver: local
  prometheus-production:
    driver: local
  loki-production:
    driver: local
  grafana-production:
    driver: local
