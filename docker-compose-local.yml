services:
  postgres-msp-api:
    image: postgres
    container_name: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      TZ: 'GMT'
      PGTZ: 'GMT'
    ports:
      - '5432:5432'
    volumes:
      - postgres:/data/postgres
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    env_file:
      - .env
  pgadmin-msp-api:
    container_name: pgadmin-msp-api
    image: dpage/pgadmin4
    ports:
      - '9090:80'
    volumes:
      - /data/pgadmin:/root/.pgadmin
    env_file:
      - .env
  minio:
    container_name: minio
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-create-bucket:
    container_name: minio-create-bucket
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - default
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/${AWS_S3_BUCKET_NAME:-api-boilerplate} --ignore-existing;
      mc anonymous set public myminio/${AWS_S3_BUCKET_NAME:-api-boilerplate};
      exit 0;
      "

  redis:
    container_name: redis-local
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction

  alertmanager:
    container_name: alertmanager-local
    image: prom/alertmanager:latest
    restart: always
    ports:
      - '9095:9093'
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SMTP_SMARTHOST: ${SMTP_SMARTHOST:-smtp.sendgrid.net:587}
      SMTP_USERNAME: ${SMTP_USERNAME:-apikey}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-${SENDGRID_API_KEY}}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-${MAIL_DEFAULT_EMAIL}}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-${MAIL_DEFAULT_EMAIL}}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.tmpl:ro
      - ./monitoring/alertmanager/docker-entrypoint.sh:/etc/alertmanager/docker-entrypoint.sh:ro
    entrypoint: ['/bin/sh', '/etc/alertmanager/docker-entrypoint.sh']

  postgres-exporter:
    container_name: postgres-exporter-local
    image: prometheuscommunity/postgres-exporter:latest
    restart: always
    environment:
      DATA_SOURCE_NAME: 'postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres-msp-api:5432/${DB_DATABASE:-api-boilerplate}?sslmode=disable'
    ports:
      - '9187:9187'

  redis-exporter:
    container_name: redis-exporter-local
    image: oliver006/redis_exporter:latest
    restart: always
    environment:
      REDIS_ADDR: 'redis://redis:6379'
    ports:
      - '9121:9121'

  prometheus:
    container_name: prometheus-local
    image: prom/prometheus:latest
    restart: always
    ports:
      - '9092:9090'
    volumes:
      - ./monitoring/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/rules/alerts:ro
      - ./monitoring/recording.rules.yml:/etc/prometheus/rules/recording.rules.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - alertmanager

  loki:
    container_name: loki-local
    image: grafana/loki:3.4.2
    restart: always
    ports:
      - '3100:3100'
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml

  grafana:
    container_name: grafana-local
    image: grafana/grafana:latest
    restart: always
    ports:
      - '3200:3000'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/api-overview.json
    depends_on:
      - prometheus
      - loki

volumes:
  postgres:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
