apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    jsonData:
      derivedFields:
        - name: RequestID
          matcherRegex: '"requestId":"([^"]+)"'
          url: ''
          datasourceUid: loki
          matcherType: label
          urlDisplayLabel: 'View Request Logs'
