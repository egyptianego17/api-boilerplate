global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/rules/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager-production:9093']

scrape_configs:
  - job_name: 'api-boilerplate'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-boilerplate-production:3000']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter-production:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter-production:9121']
