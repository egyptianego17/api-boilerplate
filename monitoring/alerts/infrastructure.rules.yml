groups:
  - name: nodejs
    rules:
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 512 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Node.js RSS memory > 512 MB'
          description: 'Process resident memory has been above 512 MB for 10 minutes. Current: {{ $value | humanize1024 }}B'

      - alert: CriticalMemoryUsage
        expr: process_resident_memory_bytes > 1024 * 1024 * 1024
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Node.js RSS memory > 1 GB'
          description: 'Process resident memory has exceeded 1 GB for 5 minutes. Current: {{ $value | humanize1024 }}B. Investigate for memory leaks.'

      - alert: MemoryLeakSuspected
        expr: deriv(process_resident_memory_bytes[30m]) > 5 * 1024 * 1024
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: 'Sustained memory growth detected'
          description: 'RSS memory is growing at > 5 MB/min over 30 minutes. Possible memory leak.'

      - alert: ProcessDown
        expr: up{job="api-boilerplate"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'API Boilerplate is down'
          description: 'The api-boilerplate target has been unreachable for 1 minute.'

      - alert: HighEventLoopLag
        expr: nodejs_eventloop_lag_p99_seconds > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Event loop p99 lag > 500ms'
          description: 'Node.js event loop p99 latency has exceeded 500ms for 5 minutes. Current: {{ $value | humanizeDuration }}'

      - alert: TooManyOpenFileDescriptors
        expr: process_open_fds / process_max_fds > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Open file descriptors > 80% of limit'
          description: 'Process is using {{ $value | humanizePercentage }} of available file descriptors.'

  - name: database
    rules:
      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'PostgreSQL exporter is down'
          description: 'Cannot scrape PostgreSQL metrics. The database may be unreachable.'

      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'PostgreSQL connections > 80% of max'
          description: '{{ $value | humanizePercentage }} of max connections in use.'

      - alert: RedisExporterDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Redis exporter is down'
          description: 'Cannot scrape Redis metrics. Redis may be unreachable.'

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Redis memory usage > 85%'
          description: 'Redis is using {{ $value | humanizePercentage }} of its configured max memory.'
